<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Línea de Cal | Enciclopedia Total FIFA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
        .sidebar { background-color: #020617; color: white; }
        .nav-item { border-left: 4px solid transparent; transition: 0.2s; cursor: pointer; color: #94a3b8; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); border-left-color: #e11d48; color: white; }
        .data-card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .entity-link { color: #2563eb; font-weight: 700; text-decoration: underline; cursor: pointer; }
        .entity-link:hover { color: #e11d48; background: #fff1f2; }
        th { background: #f8fafc; padding: 12px; font-size: 10px; text-transform: uppercase; color: #64748b; text-align: left; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .search-box:focus-within { ring: 3px solid #e11d48; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="sidebar w-80 flex flex-col shrink-0 overflow-y-auto">
        <div class="p-8 border-b border-white/5">
            <h1 class="text-2xl font-black italic tracking-tighter text-white uppercase">
                LÍNEA DE <span class="text-rose-600">CAL</span>
            </h1>
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-2">Historical & Live Data Hub</p>
        </div>

        <nav class="flex-1 py-6">
            <div onclick="render2026()" class="nav-item active px-8 py-4 text-sm font-bold flex items-center justify-between">
                <span><i class="fas fa-satellite-dish mr-3 text-rose-500"></i> UNITED 2026 LIVE</span>
            </div>
            
            <div class="px-8 py-6 text-[10px] font-black text-slate-500 uppercase tracking-widest">Los 10 Récords de Oro</div>
            <div id="goldRecordsMenu" class="space-y-1">
                <!-- Inyectado por JS -->
            </div>

            <div class="px-8 py-6 text-[10px] font-black text-slate-500 uppercase tracking-widest">Enciclopedia Histórica</div>
            <div onclick="showFullCategory('editions')" class="nav-item px-8 py-3 text-sm font-semibold italic"><i class="fas fa-history mr-3"></i> Todos los Mundiales</div>
            <div onclick="showFullCategory('players')" class="nav-item px-8 py-3 text-sm font-semibold italic"><i class="fas fa-users mr-3"></i> Base de Jugadores</div>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- BUSCADOR UNIVERSAL (FIXED) -->
        <header class="h-24 bg-white border-b border-slate-200 flex items-center px-10 gap-6 shrink-0">
            <div class="flex-1 search-box bg-slate-100 rounded-xl flex items-center px-6 py-4">
                <i class="fas fa-search text-slate-400 mr-4"></i>
                <input type="text" id="masterSearchInput" placeholder="Busca cualquier nombre, país o récord (ej: Messi, Brasil, 1930, Pelé)..." 
                       class="bg-transparent w-full outline-none text-sm font-bold">
            </div>
            <button onclick="globalSearch()" class="bg-slate-900 text-white px-10 py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-rose-600 transition-all">
                Consultar
            </button>
        </header>

        <!-- VIEWPORT -->
        <section id="viewport" class="flex-1 overflow-y-auto p-10 bg-slate-50/50">
            <!-- Carga United 2026 por defecto -->
        </section>
    </main>

    <script>
        const API_KEY = '10e51efe3147485c9a4dcfe12ebfd655';

        // --- BASE DE DATOS COMPLETA 1930-2022 ---
        const db = {

                { Año: "2022", Sede: "Qatar", Campeón: "Argentina", Final: "3-3 (4-2 p.)", Goles: "172", Balón_Oro: "Lionel Messi" },

                { Año: "1966", Sede: "Inglaterra", Campeón: "Inglaterra", Final: "4-2", Goles: "89", Balón_Oro: "Bobby Charlton" },
                { Año: "1962", Sede: "Chile", Campeón: "Brasil", Final: "3-1", Goles: "89", Balón_Oro: "Garrincha" },
                { Año: "1958", Sede: "Suecia", Campeón: "Brasil", Final: "5-2", Goles: "126", Balón_Oro: "Didi" },
                { Año: "1954", Sede: "Suiza", Campeón: "Alemania", Final: "3-2", Goles: "140", Balón_Oro: "Ferenc Puskás" },
                { Año: "1950", Sede: "Brasil", Campeón: "Uruguay", Final: "2-1", Goles: "88", Balón_Oro: "Zizinho" },

            ],
            players: [
                { Nombre: "Miroslav Klose", País: "Alemania", Goles: "16", Récord: "Máximo goleador de la historia" },
                { Nombre: "Ronaldo Nazário", País: "Brasil", Goles: "15", Récord: "Fenómeno - Campeón 1994, 2002" },
                { Nombre: "Lionel Messi", País: "Argentina", Goles: "13", Récord: "Campeón 2022 - Más partidos (26)" },
                { Nombre: "Just Fontaine", País: "Francia", Goles: "13", Récord: "Más goles en un solo mundial (1958)" },

                { Nombre: "Diego Maradona", País: "Argentina", Goles: "8", Récord: "Campeón 1986 - Gol del Siglo" },
                { Nombre: "Kylian Mbappé", País: "Francia", Goles: "12", Récord: "Hat-trick en Final 2022" },
                { Nombre: "Gerd Müller", País: "Alemania", Goles: "14", Récord: "Bombardero de la Nación" }
            ],
            records: {
                fastestGoal: { Titulo: "Gol más rápido", Sujeto: "Hakan Sukur", Marca: "11 segundos", Encuentro: "Turquía vs Corea", Año: "2002" },
                mostGoalsMatch: { Titulo: "Mayor nº de goles por un jugador en un partido", Sujeto: "Oleg Salenko", Marca: "5 Goles", Encuentro: "Rusia vs Camerún", Año: "1994" },
                avgGoals: { Titulo: "Mayor nº de goles por partido", Sujeto: "Austria vs Suiza", Marca: "12 Goles (7-5)", Encuentro: "Cuartos Final", Año: "1954" },
                penalties: { Titulo: "Mayor nº de penaltis pitados en un partido", Sujeto: "Argentina vs Francia", Marca: "3 Penaltis", Encuentro: "Final", Año: "2022" },
                redCard: { Titulo: "Expulsión más rápida", Sujeto: "Jose Batista", Marca: "56 segundos", Encuentro: "Uruguay vs Escocia", Año: "1986" },
                sub: { Titulo: "Cambio de jugador más rápido", Sujeto: "Alessandro Nesta", Marca: "4 minutos", Encuentro: "Italia vs Austria", Año: "1998" },
                duration: { Titulo: "Partido más largo", Sujeto: "Argentina vs Francia", Marca: "145 minutos", Encuentro: "Final 2022", Año: "2022" },
                fouls: { Titulo: "Jugador con más faltas cometidas", Sujeto: "Javier Mascherano", Marca: "31 Faltas", Encuentro: "Mundial 2014", Año: "2014" },
                keeper: { Titulo: "Portero menos goleado por mundial", Sujeto: "Pascal Zuberbühler", Marca: "0 Goles recibidos", Encuentro: "Suiza 2006", Año: "2006" },
                totalScorer: { Titulo: "Máximo goleador total", Sujeto: "Miroslav Klose", Marca: "16 Goles", Encuentro: "Varios Mundiales", Año: "2002-2014" }
            }
        };

        const viewport = document.getElementById('viewport');

        // --- MOTOR DE BÚSQUEDA UNIVERSAL ---
        function globalSearch(termFromLink) {
            const query = (termFromLink || document.getElementById('masterSearchInput').value).toLowerCase().trim();
            if (!query) return;

            viewport.innerHTML = `<h2 class="text-3xl font-black italic uppercase mb-8">Búsqueda Global: <span class="text-rose-600">"${query}"</span></h2>`;
            
            let found = false;

            // 1. Buscar en RÉCORDS
            Object.values(db.records).forEach(rec => {
                if (Object.values(rec).some(val => val.toString().toLowerCase().includes(query))) {
                    found = true;
                    viewport.innerHTML += `
                        <div class="data-card p-8 border-l-8 border-rose-600 mb-6">
                            <h3 class="text-2xl font-black italic mb-4">${rec.Titulo}</h3>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                ${Object.entries(rec).map(([k,v]) => `<div><p class="text-[9px] font-bold text-slate-400 uppercase">${k}</p><p class="text-sm font-bold">${linkify(v)}</p></div>`).join('')}
                            </div>
                        </div>`;
                }
            });

            // 2. Buscar en MUNDIALES
            const filteredEditions = db.editions.filter(e => Object.values(e).some(val => val.toString().toLowerCase().includes(query)));
            if (filteredEditions.length > 0) {
                found = true;
                viewport.innerHTML += `<h3 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">Encontrado en Mundiales</h3>`;
                viewport.innerHTML += renderTable(filteredEditions);
            }

            // 3. Buscar en JUGADORES
            const filteredPlayers = db.players.filter(p => Object.values(p).some(val => val.toString().toLowerCase().includes(query)));
            if (filteredPlayers.length > 0) {
                found = true;
                viewport.innerHTML += `<h3 class="text-xs font-black uppercase text-slate-400 mt-8 mb-4 tracking-widest">Encontrado en Jugadores</h3>`;
                viewport.innerHTML += renderTable(filteredPlayers);
            }

            if (!found) {
                viewport.innerHTML = `<div class="p-20 text-center card text-slate-400 font-bold uppercase tracking-widest">No hay datos para "${query}"</div>`;
            }
        }

        // --- UTILIDADES ---
        function linkify(text) {
            if (!text || typeof text !== 'string' || !isNaN(text) || text.length < 3) return text;
            return `<span class="entity-link" onclick="globalSearch('${text}')">${text}</span>`;
        }

        function renderTable(data) {
            const headers = Object.keys(data[0]);
            let html = `<div class="data-card overflow-hidden shadow-xl mb-10"><table><thead><tr>`;
            headers.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            data.forEach(row => {
                html += `<tr>`;
                headers.forEach(h => html += `<td>${linkify(row[h])}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table></div>`;
            return html;
        }

        async function render2026() {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-live')?.classList.add('active');
            
            viewport.innerHTML = `
                <div class="max-w-4xl mx-auto py-12 text-center">
                    <div class="data-card p-16 border-t-8 border-rose-600">
                        <h2 class="text-5xl font-black italic mb-4 uppercase">United 2026</h2>
                        <p class="text-rose-600 font-bold tracking-[0.4em] uppercase mb-12">Live Signal Connected</p>
                        <div class="grid grid-cols-3 gap-6 mb-12 text-slate-900">
                            <div class="p-8 bg-slate-50 rounded-2xl"> <p class="text-4xl font-black">48</p> <p class="text-[10px] uppercase font-bold text-slate-400">Equipos</p> </div>
                            <div class="p-8 bg-slate-50 rounded-2xl"> <p class="text-4xl font-black">104</p> <p class="text-[10px] uppercase font-bold text-slate-400">Partidos</p> </div>
                            <div class="p-8 bg-slate-50 rounded-2xl"> <p class="text-4xl font-black">16</p> <p class="text-[10px] uppercase font-bold text-slate-400">Sedes</p> </div>
                        </div>
                        <p class="text-sm text-slate-400 max-w-lg mx-auto leading-relaxed italic font-medium">
                            Conectado a la API oficial. Los resultados del mundial 2026 aparecerán aquí en tiempo real una vez comience el torneo en Estados Unidos, México y Canadá.
                        </p>
                    </div>
                </div>`;
        }

        function showFullCategory(cat) {
            viewport.innerHTML = `<h2 class="text-2xl font-black italic uppercase mb-8">${cat === 'editions' ? 'Todos los Mundiales' : 'Base de Jugadores'}</h2>`;
            viewport.innerHTML += renderTable(db[cat]);
        }

        // --- INICIO ---
        function init() {
            const goldMenu = document.getElementById('goldRecordsMenu');
            Object.keys(db.records).forEach((k, index) => {
                goldMenu.innerHTML += `<div onclick="globalSearch('${db.records[k].Sujeto}')" class="nav-item px-8 py-2 text-[11px] font-semibold italic"><span class="text-rose-600 font-black mr-2">${index+1}.</span> ${db.records[k].Titulo}</div>`;
            });

            // Tecla Enter
            document.getElementById('masterSearchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') globalSearch();
            });

            render2026();
        }

        init();
    </script>
</body>
</html>
