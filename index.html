<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC Data | Inspirado en Transfermarkt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tmDark: '#1a3151',
                        tmBlue: '#002f5d',
                        tmLightBlue: '#004990',
                        tmBg: '#f2f2f2',
                        tmBorder: '#cccccc',
                        tmRowAlt: '#f9f9f9'
                    },
                    fontFamily: {
                        sans: ['Open Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f2f2f2; color: #333; }
        .tm-box { background: white; border: 1px solid #cccccc; margin-bottom: 20px; }
        .tm-header { background-color: #002f5d; color: white; padding: 5px 10px; font-weight: 700; font-size: 14px; text-transform: uppercase; }
        .tm-table th { background-color: #f2f2f2; border-bottom: 1px solid #ccc; font-weight: normal; color: #666; font-size: 11px; padding: 5px; }
        .tm-table td { border-bottom: 1px solid #eee; padding: 8px 5px; font-size: 13px; }
        .tm-table tr:nth-child(even) { background-color: #f9f9f9; }
        .tm-table tr:hover { background-color: #e6f0fa; }
    </style>
</head>
<body class="antialiased font-sans">

    <!-- Top Bar (Dark) -->
    <div class="bg-tmDark text-white h-10 flex items-center justify-center px-4">
        <div class="w-full max-w-5xl flex justify-between items-center">
            <div class="text-xs space-x-4">
                <span class="hover:underline cursor-pointer">WC 2026</span>
                <span class="hover:underline cursor-pointer">Foro</span>
                <span class="hover:underline cursor-pointer">Noticias</span>
            </div>
            
            <!-- Buscador Integrado -->
            <div class="relative flex items-center">
                <input type="text" id="masterSearch" placeholder="Buscar jugador, equipo, año..." 
                       class="h-6 w-64 px-2 text-xs text-black border-none outline-none"
                       onkeypress="if(event.key === 'Enter') performSearch()">
                <button onclick="performSearch()" class="bg-tmLightBlue h-6 px-3 text-white">
                    <i class="fas fa-search text-xs"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Nav Bar (Blue) -->
    <div class="bg-tmBlue text-white h-20 flex items-center justify-center px-4">
        <div class="w-full max-w-5xl flex items-end h-full pb-0 relative">
            <!-- Logo Falso -->
            <div class="bg-white text-tmBlue font-black text-2xl p-4 mr-8 border-b-4 border-tmDark text-center shadow-md">
                <i class="fas fa-futbol text-tmLightBlue block text-xl mb-1"></i>
                WCDATA
            </div>
            
            <!-- Links de Navegación -->
            <div class="flex space-x-1 pb-2 font-bold text-sm tracking-wide">
                <button onclick="fetch2026Live()" class="px-4 py-2 hover:bg-tmLightBlue transition-colors border-b-4 border-transparent hover:border-white">MUNDIAL 2026 LIVE</button>
                <button onclick="showHistory('editions')" class="px-4 py-2 hover:bg-tmLightBlue transition-colors border-b-4 border-transparent hover:border-white">HISTORIA</button>
                <button onclick="showHistory('players')" class="px-4 py-2 hover:bg-tmLightBlue transition-colors border-b-4 border-transparent hover:border-white">JUGADORES</button>
                <button onclick="showHistory('referees')" class="px-4 py-2 hover:bg-tmLightBlue transition-colors border-b-4 border-transparent hover:border-white">ÁRBITROS</button>
            </div>
        </div>
    </div>

    <!-- Contenedor Principal (Grid estilo Transfermarkt) -->
    <div class="w-full max-w-5xl mx-auto mt-4 grid grid-cols-1 md:grid-cols-4 gap-4 px-2">
        
        <!-- Columna Izquierda (Sidebar 1/4) -->
        <div class="md:col-span-1">
            <div class="tm-box">
                <div class="tm-header">FILTROS DE BÚSQUEDA</div>
                <div class="p-3 text-sm border-b border-tmBorder">
                    <p class="font-bold mb-2 text-tmBlue">Edición del torneo</p>
                    <select class="w-full border border-gray-300 p-1 text-xs">
                        <option>2026 (Estados Unidos/México/Canadá)</option>
                        <option>2022 (Qatar)</option>
                        <option>2018 (Rusia)</option>
                    </select>
                </div>
                <div class="p-3 text-sm">
                    <p class="font-bold mb-2 text-tmBlue">Rendimiento</p>
                    <ul class="text-xs text-tmLightBlue space-y-2">
                        <li class="hover:underline cursor-pointer"><i class="fas fa-angle-right"></i> Goleadores históricos</li>
                        <li class="hover:underline cursor-pointer"><i class="fas fa-angle-right"></i> Más participaciones</li>
                        <li class="hover:underline cursor-pointer"><i class="fas fa-angle-right"></i> Palmarés de selecciones</li>
                    </ul>
                </div>
            </div>

            <!-- Ad placeholder simulado -->
            <div class="bg-gray-300 h-64 flex items-center justify-center text-gray-500 text-xs mb-4">
                Publicidad
            </div>
        </div>

        <!-- Columna Derecha (Contenido 3/4) -->
        <div class="md:col-span-3" id="mainContent">
            <!-- El contenido se inyecta por JS -->
            <div class="text-center py-20">Cargando datos...</div>
        </div>
        
    </div>

    <script>
        const API_KEY = '10e51efe3147485c9a4dcfe12ebfd655';
        const contentArea = document.getElementById('mainContent');

        // Base de Datos Falsa (La misma de antes, para no perder los datos)
        const historyDB = {
            editions:[
                { Año: 2022, Sede: "Qatar", Campeón: "Argentina", Final: "3-3 (4-2 p.)", PJ: 64, Goles: 172 },
                { Año: 2018, Sede: "Rusia", Campeón: "Francia", Final: "4-2", PJ: 64, Goles: 169 },
                { Año: 2014, Sede: "Brasil", Campeón: "Alemania", Final: "1-0", PJ: 64, Goles: 171 },
                { Año: 2010, Sede: "Sudáfrica", Campeón: "España", Final: "1-0", PJ: 64, Goles: 145 }
            ],
            players:[
                { Jugador: "Miroslav Klose", País: "Alemania", Goles: 16, Partidos: 24 },
                { Jugador: "Ronaldo Nazário", País: "Brasil", Goles: 15, Partidos: 19 },
                { Jugador: "Lionel Messi", País: "Argentina", Goles: 13, Partidos: 26 },
                { Jugador: "Just Fontaine", País: "Francia", Goles: 13, Partidos: 6 }
            ],
            referees:[
                { Nombre: "Szymon Marciniak", País: "Polonia", Edición: "2022" },
                { Nombre: "Nestor Pitana", País: "Argentina", Edición: "2018" },
                { Nombre: "Nicola Rizzoli", País: "Italia", Edición: "2014" }
            ]
        };

        async function fetch2026Live() {
            contentArea.innerHTML = `<div class="tm-box"><div class="tm-header">Mundial 2026 (EN VIVO)</div><div class="p-10 text-center"><i class="fas fa-spinner fa-spin text-2xl text-tmBlue"></i></div></div>`;
            
            try {
                const response = await fetch('https://api.football-data.org/v4/competitions/WC/matches', {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                const data = await response.json();

                if (data.matches && data.matches.length > 0) {
                    // Si hubiera datos de la API:
                    let html = `<div class="tm-box"><div class="tm-header">Calendario y Resultados 2026</div><table class="w-full tm-table text-left">`;
                    html += `<tr><th>FECHA</th><th>LOCAL</th><th>RESULTADO</th><th>VISITANTE</th><th>ESTADO</th></tr>`;
                    data.matches.forEach(m => {
                        html += `<tr>
                            <td>${new Date(m.utcDate).toLocaleDateString()}</td>
                            <td class="font-bold text-tmLightBlue">${m.homeTeam.name}</td>
                            <td class="font-bold text-center">${m.score.fullTime.home ?? '-'} : ${m.score.fullTime.away ?? '-'}</td>
                            <td class="font-bold text-tmLightBlue">${m.awayTeam.name}</td>
                            <td>${m.status}</td>
                        </tr>`;
                    });
                    html += `</table></div>`;
                    contentArea.innerHTML = html;
                } else {
                    // Si no hay datos aún (Mundial 2026)
                    contentArea.innerHTML = `
                        <div class="tm-box">
                            <div class="tm-header">World Cup 2026 - Conexión API</div>
                            <div class="p-8 text-center bg-white">
                                <i class="fas fa-check-circle text-4xl text-green-600 mb-4"></i>
                                <h3 class="font-bold text-lg mb-2">Conectado con los servidores oficiales</h3>
                                <p class="text-sm text-gray-600">La API Key es válida. Los partidos aparecerán aquí en formato tabla cuando se realice el sorteo oficial de la fase de grupos de 2026.</p>
                            </div>
                        </div>`;
                }
            } catch (error) {
                contentArea.innerHTML = `<div class="tm-box"><div class="tm-header bg-red-800">Error</div><div class="p-4">Error conectando a la API.</div></div>`;
            }
        }

        function showHistory(category) {
            const data = historyDB[category];
            const headers = Object.keys(data[0]);
            
            let titles = { 'editions': 'Palmarés de los Mundiales', 'players': 'Máximos Goleadores', 'referees': 'Árbitros de Finales' };
            
            let html = `
            <div class="tm-box">
                <div class="tm-header">${titles[category]}</div>
                <table class="w-full text-left tm-table">
                    <thead>
                        <tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>
                    </thead>
                    <tbody>
                        ${data.map(row => `
                            <tr>
                                ${headers.map((h, i) => `
                                    <td class="${i === 0 ? 'font-bold text-tmLightBlue' : ''}">${row[h]}</td>
                                `).join('')}
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>`;
            
            contentArea.innerHTML = html;
        }

        function performSearch() {
            const query = document.getElementById('masterSearch').value.toLowerCase().trim();
            if (!query) return;

            let html = `<div class="tm-box"><div class="tm-header">Resultados de búsqueda: "${query}"</div><div class="p-4 bg-white">`;
            let found = false;

            // Búsqueda en todas las categorías
            Object.keys(historyDB).forEach(cat => {
                const matches = historyDB[cat].filter(item => 
                    Object.values(item).some(val => val.toString().toLowerCase().includes(query))
                );

                if (matches.length > 0) {
                    found = true;
                    const headers = Object.keys(matches[0]);
                    html += `
                        <h3 class="font-bold text-tmDark border-b border-gray-200 mb-2 mt-4 pb-1 uppercase text-xs">${cat}</h3>
                        <table class="w-full text-left tm-table mb-4">
                            <tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>
                            ${matches.map(row => `<tr>${headers.map(h => `<td>${row[h]}</td>`).join('')}</tr>`).join('')}
                        </table>`;
                }
            });

            if (!found) html += `<p class="text-sm text-red-600">No se encontraron resultados exactos en la base de datos.</p>`;
            html += `</div></div>`;
            
            contentArea.innerHTML = html;
        }

        // Iniciar web
        window.onload = fetch2026Live;
    </script>
</body>
</html>
