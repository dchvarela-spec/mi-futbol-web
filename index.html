    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
        .sidebar { background-color: #020617; }
        .nav-item { border-left: 4px solid transparent; transition: 0.2s; cursor: pointer; color: #94a3b8; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); border-left-color: #e11d48; color: white; }
        .card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .entity-link { color: #2563eb; font-weight: 700; text-decoration: underline; cursor: pointer; transition: 0.2s; }
        .entity-link:hover { color: #e11d48; background: #fff1f2; }
        .live-pulse { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        th { background: #f1f5f9; padding: 12px; font-size: 10px; text-transform: uppercase; color: #64748b; text-align: left; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .search-container:focus-within { ring: 3px solid #e11d48; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->

            <div class="flex items-center gap-2 mt-3">
                <div class="live-pulse"></div>

            </div>
        </div>

        <nav class="flex-1 py-6 space-y-1">
            <div onclick="showTab('live')" id="btn-live" class="nav-item active px-8 py-4 text-sm font-bold flex items-center justify-between">
                <span><i class="fas fa-satellite-dish mr-3"></i> UNITED 2026 LIVE</span>
                <span class="bg-rose-600 text-[8px] px-1 rounded text-white">LIVE</span>
            </div>
            
            <div class="px-8 py-6 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Rankings Oro</div>

            </div>

            <div class="px-8 py-6 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Archivo Maestro</div>
            <div onclick="showTab('history')" id="btn-history" class="nav-item px-8 py-3 text-sm font-semibold italic"><i class="fas fa-history mr-3"></i> Todos los Mundiales</div>
            <div onclick="showTab('players')" id="btn-players" class="nav-item px-8 py-3 text-sm font-semibold italic"><i class="fas fa-users mr-3"></i> Enciclopedia Jugadores</div>
        </nav>
    </aside>

    <!-- MAIN -->

            <div class="flex-1 search-container bg-slate-100 rounded-xl flex items-center px-6 py-4 transition-all">
                <i class="fas fa-search text-slate-400 mr-4"></i>
                <input type="text" id="globalSearch" placeholder="Busca un jugador, país, sede, árbitro o año (ej: 'Maradona', 'México', '2026')..." 
                       class="bg-transparent w-full outline-none text-sm font-bold placeholder:text-slate-400">
            </div>
            <button onclick="executeSearch()" class="bg-slate-900 text-white px-10 py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-rose-600 transition-all shadow-xl">
                Consultar
            </button>
        </header>

        <!-- VIEWPORT -->
        <section id="viewport" class="flex-1 overflow-y-auto p-10 bg-slate-50/50">
            <!-- Cargando Live 2026 por defecto -->
        </section>
    </main>

            ],
            records: {

                penalties: { Título: "Más penaltis en una final", Sujeto: "Argentina vs Francia", Dato: "3 Penaltis", Partido: "Final 2022", Año: "2022" },
                redCard: { Título: "Expulsión más rápida", Sujeto: "Jose Batista", Dato: "56 segundos", Partido: "Uruguay vs Escocia", Año: "1986" },
                sub: { Título: "Cambio más rápido", Sujeto: "Alessandro Nesta", Dato: "4 minutos", Partido: "Italia vs Austria", Año: "1998" },
                duration: { Título: "Partido más largo", Sujeto: "Argentina vs Francia", Dato: "145 min (inc. descuentos)", Partido: "Final 2022", Año: "2022" },
                fouls: { Título: "Más faltas cometidas en un torneo", Sujeto: "Javier Mascherano", Dato: "31 Faltas", Partido: "Mundial 2014", Año: "2014" },
                keeper: { Título: "Portero menos goleado", Sujeto: "Pascal Zuberbühler", Dato: "0 Goles recibidos", Partido: "Suiza 2006", Año: "2006" },
                participation: { Título: "Más mundiales jugados", Sujeto: "Cristiano Ronaldo, Messi, Guardado, Carbajal, Matthäus", Dato: "5 Mundiales", Partido: "Récord compartido", Año: "Varios" }
            }
        };

        const viewport = document.getElementById('viewport');

        // BUSCADOR UNIVERSAL "DEEP SCAN"
        function executeSearch(forcedQuery) {
            const query = (forcedQuery || document.getElementById('globalSearch').value).toLowerCase().trim();
            if (!query) return;

            viewport.innerHTML = `<div class="mb-10"><h2 class="text-3xl font-black italic uppercase italic">Resultados para: <span class="text-rose-600">"${query}"</span></h2></div>`;
            
            let foundCount = 0;

            // 1. Escanear Récords
            Object.values(db.records).forEach(r => {
                if (JSON.stringify(r).toLowerCase().includes(query)) {
                    foundCount++;
                    viewport.innerHTML += `
                        <div class="card p-8 border-l-8 border-rose-600 mb-6">
                            <span class="text-[10px] font-black uppercase text-rose-600 bg-rose-50 px-2 py-1 rounded">Récord Encontrado</span>
                            <h3 class="text-2xl font-black italic mt-3 mb-4">${r.Título}</h3>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                                ${Object.entries(r).map(([k,v]) => `<div><p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${k}</p><p class="text-sm font-bold">${linkify(v)}</p></div>`).join('')}
                            </div>
                        </div>`;
                }
            });

            // 2. Escanear Mundiales
            const filteredEditions = db.editions.filter(e => JSON.stringify(e).toLowerCase().includes(query));
            if (filteredEditions.length > 0) {
                foundCount++;
                viewport.innerHTML += `<h3 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">Ediciones Relacionadas</h3>`;
                viewport.innerHTML += renderTable(filteredEditions);
            }

            // 3. Escanear Jugadores
            const filteredPlayers = db.players.filter(p => JSON.stringify(p).toLowerCase().includes(query));
            if (filteredPlayers.length > 0) {
                foundCount++;
                viewport.innerHTML += `<h3 class="text-xs font-black uppercase text-slate-400 mt-10 mb-4 tracking-widest">Fichas de Jugadores</h3>`;
                viewport.innerHTML += renderTable(filteredPlayers);
            }

            if (foundCount === 0) {
                viewport.innerHTML = `<div class="p-20 text-center card"><i class="fas fa-search text-4xl text-slate-200 mb-4"></i><p class="text-slate-400 font-bold uppercase tracking-widest">No hay coincidencias para "${query}" en la base de datos.</p></div>`;
            }
        }

        // CONVERTIR NOMBRES EN LINKS
        function linkify(text) {
            if (!text || typeof text !== 'string' || !isNaN(text) || text.length < 3) return text;
            return `<span class="entity-link" onclick="executeSearch('${text}')">${text}</span>`;
        }

        // RENDER DE TABLAS
        function renderTable(data) {
            const headers = Object.keys(data[0]);
            let html = `<div class="card overflow-hidden shadow-xl mb-10"><table><thead><tr>`;
            headers.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            data.forEach(row => {
                html += `<tr>`;
                headers.forEach(h => html += `<td>${linkify(row[h])}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table></div>`;
            return html;
        }

        // LIVE 2026 ENGINE
        async function fetch2026() {
            showTab('live');
            viewport.innerHTML = `<div class="flex flex-col items-center justify-center h-full animate-pulse"><div class="w-10 h-10 border-4 border-rose-600 border-t-transparent rounded-full animate-spin"></div><p class="mt-4 text-[10px] font-black uppercase tracking-widest text-slate-400 font-mono">Sincronizando Live Data 2026...</p></div>`;
            
            try {
                const res = await fetch('https://api.football-data.org/v4/competitions/WC/matches', { headers: { 'X-Auth-Token': API_KEY }});
                const data = await res.json();
                
                if (data.matches && data.matches.length > 0) {
                    renderLiveMatches(data.matches);
                } else {
                    renderCountdown();
                }
            } catch (e) {
                renderCountdown();
            }
        }

        function renderCountdown() {
            viewport.innerHTML = `
                <div class="max-w-4xl mx-auto py-12">
                    <div class="card p-16 text-center border-t-8 border-rose-600 rounded-3xl">
                        <h2 class="text-5xl font-black italic mb-4 uppercase tracking-tighter text-slate-900">United 2026</h2>
                        <p class="text-rose-600 font-bold uppercase tracking-[0.3em] mb-10 italic">Próxima Parada: USA · MEX · CAN</p>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                            <div class="p-8 bg-slate-50 rounded-2xl border border-slate-100"><p class="text-4xl font-black italic">48</p><p class="text-[10px] font-bold text-slate-400 uppercase">Selecciones</p></div>
                            <div class="p-8 bg-slate-50 rounded-2xl border border-slate-100"><p class="text-4xl font-black italic">104</p><p class="text-[10px] font-bold text-slate-400 uppercase">Partidos</p></div>
                            <div class="p-8 bg-slate-50 rounded-2xl border border-slate-100"><p class="text-4xl font-black italic">16</p><p class="text-[10px] font-bold text-slate-400 uppercase">Sedes</p></div>
                        </div>
                        <p class="text-sm font-medium text-slate-400 leading-relaxed max-w-xl mx-auto">
                            La señal en tiempo real está activa. En cuanto la FIFA realice el sorteo de grupos y comience la competición, los resultados aparecerán aquí automáticamente en tiempo real.
                        </p>
                    </div>
                </div>`;
        }

        function showTab(id) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-' + id)?.classList.add('active');
            if (id === 'history') viewport.innerHTML = `<h2 class="text-2xl font-black italic uppercase mb-8">Todos los Mundiales (1930-2022)</h2>` + renderTable(db.editions);
            if (id === 'players') viewport.innerHTML = `<h2 class="text-2xl font-black italic uppercase mb-8">Enciclopedia de Jugadores Históricos</h2>` + renderTable(db.players);
        }

        // GENERAR MENÚ DE RÉCORDS
        function init() {
            const menu = document.getElementById('recordsMenu');
            Object.keys(db.records).forEach((key, index) => {
                menu.innerHTML += `<div onclick="executeSearch('${db.records[key].Sujeto}')" class="nav-item px-8 py-2 text-[11px] font-semibold italic"><span class="text-rose-600 mr-2 font-black">${index+1}.</span> ${db.records[key].Título}</div>`;
            });
            fetch2026();
        }

        // EVENTO ENTER
        document.getElementById('globalSearch').addEventListener('keypress', (e) => { if(e.key === 'Enter') executeSearch(); });

        init();
    </script>
</body>
</html>
