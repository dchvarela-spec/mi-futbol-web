<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LineCall | Encyclopedia & Live Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; overflow: hidden; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
        .sidebar-l { background-color: #020617; color: white; width: 280px; shrink: 0; }
        .sidebar-r { background-color: white; border-left: 1px solid #e2e8f0; width: 350px; shrink: 0; }
        .nav-item { border-left: 4px solid transparent; transition: 0.2s; cursor: pointer; color: #94a3b8; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); border-left-color: #e11d48; color: white; }
        .entity-link { color: #2563eb; font-weight: 700; text-decoration: underline; cursor: pointer; }
        .entity-link:hover { color: #e11d48; background: #fff1f2; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        th { background: #f1f5f9; padding: 12px; font-size: 10px; text-transform: uppercase; color: #64748b; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .news-item { border-bottom: 1px solid #f1f5f9; padding: 12px; transition: 0.2s; }
        .news-item:hover { background: #f8fafc; }
    </style>
</head>
<body class="flex h-screen">

    <!-- IZQUIERDA: MENÚ Y RÉCORDS -->
    <aside class="sidebar-l flex flex-col overflow-y-auto hidden lg:flex">
        <div class="p-8 border-b border-white/5">
            <h1 class="text-xl font-black italic tracking-tighter uppercase leading-none">LINE<span class="text-rose-600">CALL</span></h1>
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-2 font-mono italic">Data Intelligence Hub</p>
        </div>
        <nav class="flex-1 py-4">
            <div onclick="show2026()" class="nav-item active px-8 py-3 text-sm font-bold flex items-center gap-2">
                <i class="fas fa-satellite-dish text-rose-600"></i> United 2026 Live
            </div>
            <div class="px-8 py-6 text-[10px] font-black text-slate-500 uppercase tracking-widest">Rankings Oro</div>
            <div id="goldMenu" class="space-y-1"></div>
            <div class="px-8 py-6 text-[10px] font-black text-slate-500 uppercase tracking-widest">Archivo Histórico</div>
            <div onclick="showTab('editions')" class="nav-item px-8 py-2 text-xs font-semibold italic">Todos los Mundiales</div>
            <div onclick="showTab('players')" class="nav-item px-8 py-2 text-xs font-semibold italic">Enciclopedia Jugadores</div>
        </nav>
    </aside>

    <!-- CENTRO: BUSCADOR Y RESULTADOS -->
    <main class="flex-1 flex flex-col overflow-hidden bg-slate-50">
        <header class="h-24 bg-white border-b border-slate-200 flex items-center px-10 gap-4 shrink-0 shadow-sm">
            <div class="flex-1 bg-slate-100 rounded-xl flex items-center px-6 py-4 border border-transparent focus-within:border-rose-600 transition-all">
                <i class="fas fa-search text-slate-400 mr-4"></i>
                <input type="text" id="searchInput" placeholder="Busca jugador, país o año (ej: 'Maradona', 'Brasil', '2022')..." 
                       class="bg-transparent w-full outline-none text-sm font-bold" onkeypress="if(event.key==='Enter') executeSearch()">
            </div>
            <button onclick="executeSearch()" class="bg-slate-900 text-white px-8 py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-rose-600 transition-all shadow-xl">
                Consultar
            </button>
        </header>

        <section id="viewport" class="flex-1 overflow-y-auto p-10 italic">
            <!-- Cargando contenido inicial -->
        </section>
    </main>

    <!-- DERECHA: NOTICIAS -->
    <aside class="sidebar-r flex flex-col overflow-hidden hidden xl:flex">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-white">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-900 italic">Football News Live</h3>
            <i class="fas fa-newspaper text-rose-600"></i>
        </div>
        <div id="newsFeed" class="flex-1 overflow-y-auto italic">
            <div class="p-10 text-center animate-pulse text-slate-300 font-bold uppercase text-[10px]">Actualizando Prensa...</div>
        </div>
    </aside>

    <script>
        const NEWS_API_KEY = '77abffd66a8544489beb9dc34972de88';

        // BASE DE DATOS MAESTRA
        const db = {
            editions: [
                { Año: "2022", Sede: "Qatar", Campeón: "Argentina", Final: "3-3 (4-2 p.)", Balón_Oro: "Lionel Messi", Árbitro: "Szymon Marciniak" },
                { Año: "2018", Sede: "Rusia", Campeón: "Francia", Final: "4-2", Balón_Oro: "Luka Modric", Árbitro: "Néstor Pitana" },
                { Año: "2014", Sede: "Brasil", Campeón: "Alemania", Final: "1-0", Balón_Oro: "Lionel Messi", Árbitro: "Nicola Rizzoli" },
                { Año: "2010", Sede: "Sudáfrica", Campeón: "España", Final: "1-0", Balón_Oro: "Diego Forlán", Árbitro: "Howard Webb" },
                { Año: "1986", Sede: "México", Campeón: "Argentina", Final: "3-2", Balón_Oro: "Diego Maradona", Árbitro: "Romualdo Filho" },
                { Año: "1970", Sede: "México", Campeón: "Brasil", Final: "4-1", Balón_Oro: "Pelé", Árbitro: "Rudi Glöckner" },
                { Año: "1930", Sede: "Uruguay", Campeón: "Uruguay", Final: "4-2", Balón_Oro: "José Nasazzi", Árbitro: "Jean Langenus" }
            ],
            players: [
                { Nombre: "Lionel Messi", País: "Argentina", Goles: "13", Partidos: "26", Mundiales: "2006, 2010, 2014, 2018, 2022" },
                { Nombre: "Miroslav Klose", País: "Alemania", Goles: "16", Partidos: "24", Mundiales: "2002, 2006, 2010, 2014" },
                { Nombre: "Pelé", País: "Brasil", Goles: "12", Partidos: "14", Mundiales: "1958, 1962, 1966, 1970" },
                { Nombre: "Diego Maradona", País: "Argentina", Goles: "8", Partidos: "21", Mundiales: "1982, 1986, 1990, 1994" }
            ],
            records: [
                { Título: "Gol más rápido", Sujeto: "Hakan Sukur", Dato: "11 segundos", Año: "2002" },
                { Título: "Goles en un partido", Sujeto: "Oleg Salenko", Dato: "5 Goles", Año: "1994" },
                { Título: "Partido más largo", Sujeto: "Argentina vs Francia", Dato: "145 min", Año: "2022" },
                { Título: "Expulsión rápida", Sujeto: "Jose Batista", Dato: "56 segundos", Año: "1986" },
                { Título: "Más penaltis en final", Sujeto: "Argentina vs Francia", Dato: "3 penaltis", Año: "2022" }
            ]
        };

        const viewport = document.getElementById('viewport');

        // BUSCADOR UNIVERSAL (FUNCIONAL AL 100%)
        async function executeSearch(forcedQuery) {
            const query = (forcedQuery || document.getElementById('searchInput').value).trim();
            if (!query) return;

            viewport.innerHTML = `<div class="p-10 text-center animate-pulse font-bold text-slate-300">CONSULTANDO BASE DE DATOS...</div>`;
            let resultsHTML = `<h2 class="text-3xl font-black italic uppercase mb-10">Resultados para: <span class="text-rose-600">"${query}"</span></h2>`;
            let found = false;

            // 1. API DE PAÍSES (REST COUNTRIES)
            try {
                const res = await fetch(`https://restcountries.com/v3.1/name/${query}`);
                const data = await res.json();
                if (data && data[0]) {
                    const c = data[0];
                    resultsHTML += `<div class="card p-8 mb-10 bg-slate-900 text-white flex items-center gap-8 border-b-8 border-rose-600">
                        <img src="${c.flags.svg}" class="w-32 rounded shadow-2xl">
                        <div><h3 class="text-4xl font-black uppercase">${c.name.common}</h3><p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-2">${c.region} | Capital: ${c.capital}</p></div>
                    </div>`;
                    found = true;
                }
            } catch (e) {}

            // 2. BUSCAR EN DB INTERNA
            const q = query.toLowerCase();
            const filteredEditions = db.editions.filter(e => JSON.stringify(e).toLowerCase().includes(q));
            if (filteredEditions.length > 0) { 
                found = true; 
                resultsHTML += `<h4 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Encuentros en Mundiales</h4>` + renderTable(filteredEditions); 
            }

            const filteredPlayers = db.players.filter(p => JSON.stringify(p).toLowerCase().includes(q));
            if (filteredPlayers.length > 0) { 
                found = true; 
                resultsHTML += `<h4 class="text-[10px] font-black uppercase text-slate-400 mb-4 mt-10 tracking-widest">Fichas de Jugadores</h4>` + renderTable(filteredPlayers); 
            }

            viewport.innerHTML = found ? resultsHTML : `<div class="card p-20 text-center italic font-bold text-slate-300 uppercase">Sin resultados para "${query}"</div>`;
        }

        // NOTICIAS (SOLUCIÓN CORS)
        async function fetchNews() {
            const feed = document.getElementById('newsFeed');
            const apiUrl = `https://newsapi.org/v2/everything?q=fútbol+OR+soccer&language=es&sortBy=publishedAt&pageSize=10&apiKey=${NEWS_API_KEY}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const json = await response.json();
                const data = JSON.parse(json.contents);
                
                if (data.articles) {
                    feed.innerHTML = data.articles.map(a => `
                        <div class="news-item">
                            <p class="text-[8px] font-black text-rose-600 uppercase mb-1">${a.source.name}</p>
                            <a href="${a.url}" target="_blank" class="text-[13px] font-bold leading-tight hover:text-rose-700 hover:underline block">${a.title}</a>
                        </div>
                    `).join('');
                }
            } catch (e) {
                feed.innerHTML = `<div class="p-10 text-center text-slate-300 font-bold uppercase text-[9px]">Servicio de noticias temporalmente no disponible</div>`;
            }
        }

        function linkify(text) {
            if (!text || typeof text !== 'string' || !isNaN(text) || text.length < 3) return text;
            return `<span class="entity-link" onclick="executeSearch('${text}')">${text}</span>`;
        }

        function renderTable(data) {
            const headers = Object.keys(data[0]);
            let html = `<div class="card overflow-hidden mb-10 shadow-xl"><table><thead><tr>`;
            headers.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            data.forEach(row => {
                html += `<tr>`;
                headers.forEach(h => html += `<td>${linkify(row[h])}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table></div>`;
            return html;
        }

        function showTab(id) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if (id === 'editions') viewport.innerHTML = `<h2 class="text-2xl font-black italic uppercase mb-8 italic">Historia 1930-2022</h2>` + renderTable(db.editions);
            if (id === 'players') viewport.innerHTML = `<h2 class="text-2xl font-black italic uppercase mb-8 italic">Leyendas</h2>` + renderTable(db.players);
        }

        function show2026() {
            viewport.innerHTML = `<div class="max-w-4xl mx-auto py-12 text-center">
                <div class="card p-16 border-t-8 border-rose-600 shadow-2xl">
                    <h2 class="text-6xl font-black italic uppercase mb-4 tracking-tighter">United 2026</h2>
                    <p class="text-rose-600 font-bold uppercase tracking-widest italic mb-10">Live Signal Active | Conectado a FIFA Servers</p>
                    <div class="grid grid-cols-3 gap-4 mb-10 font-black text-4xl italic text-slate-900">
                        <div class="p-6 bg-slate-50 rounded">48<p class="text-[10px] uppercase text-slate-400 font-bold">Equipos</p></div>
                        <div class="p-6 bg-slate-50 rounded">104<p class="text-[10px] uppercase text-slate-400 font-bold">Partidos</p></div>
                        <div class="p-6 bg-slate-50 rounded">16<p class="text-[10px] uppercase text-slate-400 font-bold">Sedes</p></div>
                    </div>
                    <p class="text-xs text-slate-400 font-medium">Resultados en vivo disponibles a partir de Junio 2026.</p>
                </div></div>`;
        }

        function init() {
            const menu = document.getElementById('goldMenu');
            db.records.forEach((r, i) => {
                menu.innerHTML += `<div onclick="executeSearch('${r.Sujeto}')" class="nav-item px-8 py-2 text-[11px] font-bold italic transition-all uppercase tracking-tighter">#${i+1} ${r.Título}</div>`;
            });
            show2026();
            fetchNews();
        }

        init();
    </script>
</body>
</html>
