<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Línea de Cal | Buscador Universal WC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
        .sidebar-active { background-color: #ffffff; border-left: 4px solid #be123c; color: #be123c; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .card-premium { background: white; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .result-section { border-left: 2px solid #be123c; padding-left: 1.5rem; margin-bottom: 2rem; }
        .live-dot { width: 8px; height: 8px; background: #be123c; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .search-focus:focus-within { ring: 2px solid #be123c; border-color: transparent; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <!-- Sidebar -->
    <aside class="w-80 bg-slate-50 border-r border-slate-200 flex flex-col z-20">
        <div class="p-8 border-b border-slate-200 bg-white">
            <h1 class="text-2xl font-black italic tracking-tighter leading-none text-slate-900">
                LÍNEA DE <span class="text-rose-700">CAL</span>
            </h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-2 italic">Data Search Engine</p>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <div class="px-4 py-4">
                <button onclick="fetch2026Live()" id="btn-live" class="sidebar-active w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-bold transition-all mb-4">
                    <i class="fas fa-satellite"></i> United 2026 Live
                </button>
                <div class="space-y-1">
                    <button onclick="showHistory('editions')" id="btn-editions" class="w-full text-left px-4 py-2 text-xs font-bold text-slate-500 hover:text-rose-700 uppercase tracking-widest transition-all">
                        <i class="fas fa-award mr-2 opacity-50"></i> Palmarés
                    </button>
                    <button onclick="showHistory('players')" id="btn-players" class="w-full text-left px-4 py-2 text-xs font-bold text-slate-500 hover:text-rose-700 uppercase tracking-widest transition-all">
                        <i class="fas fa-user-ninja mr-2 opacity-50"></i> Leyendas
                    </button>
                    <button onclick="showHistory('referees')" id="btn-referees" class="w-full text-left px-4 py-2 text-xs font-bold text-slate-500 hover:text-rose-700 uppercase tracking-widest transition-all">
                        <i class="fas fa-gavel mr-2 opacity-50"></i> Árbitros
                    </button>
                </div>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden bg-slate-100/50">
        <!-- Header con Buscador -->
        <header class="h-24 bg-white border-b border-slate-200 flex items-center px-10 gap-8">
            <div class="flex-1 max-w-2xl">
                <div class="relative search-focus rounded-lg border border-slate-200 bg-slate-50 transition-all">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="masterSearch" placeholder="Busca un jugador, selección, año o árbitro..." 
                           class="w-full bg-transparent py-3 pl-12 pr-4 outline-none text-sm font-medium"
                           onkeypress="if(event.key === 'Enter') performSearch()">
                </div>
            </div>
            <button onclick="performSearch()" class="bg-slate-900 text-white px-6 py-3 rounded-lg text-xs font-black uppercase tracking-widest hover:bg-rose-700 transition-all">
                Buscar
            </button>
        </header>

        <!-- Area de Datos -->
        <section id="contentArea" class="flex-1 overflow-y-auto p-10">
            <div id="display" class="max-w-5xl mx-auto">
                <!-- Los resultados aparecerán aquí -->
                <div class="text-center py-20">
                    <i class="fas fa-terminal text-4xl text-slate-200 mb-4"></i>
                    <h2 class="text-slate-400 font-bold uppercase tracking-widest text-xs">Sistema de Consulta Global Listo</h2>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_KEY = '10e51efe3147485c9a4dcfe12ebfd655';
        const display = document.getElementById('display');

        const historyDB = {
            editions: [
                { Año: 2022, Sede: "Qatar", Campeón: "Argentina", Final: "3-3 (4-2 p.)", Goles: 172 },
                { Año: 2018, Sede: "Rusia", Campeón: "Francia", Final: "4-2", Goles: 169 },
                { Año: 2014, Sede: "Brasil", Campeón: "Alemania", Final: "1-0", Goles: 171 },
                { Año: 2010, Sede: "Sudáfrica", Campeón: "España", Final: "1-0", Goles: 145 },
                { Año: 2006, Sede: "Alemania", Campeón: "Italia", Final: "1-1", Goles: 147 },
                { Año: 1970, Sede: "México", Campeón: "Brasil", Final: "4-1", Goles: 95 }
            ],
            players: [
                { Nombre: "Miroslav Klose", Goles: 16, País: "Alemania", Récord: "Máximo goleador histórico" },
                { Nombre: "Lionel Messi", Goles: 13, País: "Argentina", Récord: "Más partidos jugados (26)" },
                { Nombre: "Pelé", Goles: 12, País: "Brasil", Récord: "Único con 3 títulos" },
                { Nombre: "Ronaldo Nazário", Goles: 15, País: "Brasil", Récord: "Balón de Oro 1998" }
            ],
            referees: [
                { Nombre: "Szymon Marciniak", Final: "2022", Origen: "Polonia" },
                { Nombre: "Pierluigi Collina", Final: "2002", Origen: "Italia" },
                { Nombre: "Howard Webb", Final: "2010", Origen: "Inglaterra" }
            ]
        };

        function performSearch() {
            const query = document.getElementById('masterSearch').value.toLowerCase().trim();
            if (!query) return;

            display.innerHTML = `<h2 class="text-2xl font-black uppercase italic mb-8">Resultados para: <span class="text-rose-700">"${query}"</span></h2>`;
            let resultsFound = false;

            // 1. Buscar en Ediciones
            const editionsMatches = historyDB.editions.filter(e => 
                e.Año.toString().includes(query) || e.Sede.toLowerCase().includes(query) || e.Campeón.toLowerCase().includes(query)
            );
            if (editionsMatches.length > 0) {
                resultsFound = true;
                renderSearchResults(editionsMatches, "Archivo Histórico / Mundiales");
            }

            // 2. Buscar en Jugadores
            const playersMatches = historyDB.players.filter(p => 
                p.Nombre.toLowerCase().includes(query) || p.País.toLowerCase().includes(query)
            );
            if (playersMatches.length > 0) {
                resultsFound = true;
                renderSearchResults(playersMatches, "Base de Datos de Jugadores");
            }

            // 3. Buscar en Árbitros
            const refMatches = historyDB.referees.filter(r => 
                r.Nombre.toLowerCase().includes(query) || r.Origen.toLowerCase().includes(query)
            );
            if (refMatches.length > 0) {
                resultsFound = true;
                renderSearchResults(refMatches, "Cuerpo Arbitral");
            }

            if (!resultsFound) {
                display.innerHTML += `
                    <div class="bg-white p-10 border border-slate-200 text-center">
                        <p class="text-slate-400 font-medium">No se han encontrado registros que coincidan con la búsqueda.</p>
                    </div>`;
            }
        }

        function renderSearchResults(data, categoryTitle) {
            const section = document.createElement('div');
            section.className = "result-section";
            section.innerHTML = `<h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4">${categoryTitle}</h3>`;

            const grid = document.createElement('div');
            grid.className = "grid grid-cols-1 md:grid-cols-2 gap-4";

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = "card-premium p-5 rounded-sm shadow-sm";
                
                let content = '';
                for (let key in item) {
                    content += `<div class="flex justify-between text-xs border-b border-slate-50 py-1">
                                    <span class="text-slate-400 font-bold uppercase text-[9px]">${key}</span>
                                    <span class="font-bold text-slate-800">${item[key]}</span>
                                </div>`;
                }
                card.innerHTML = content;
                grid.appendChild(card);
            });

            section.appendChild(grid);
            display.appendChild(section);
        }

        // --- FUNCIONES DE NAVEGACIÓN (Se mantienen de la v4) ---
        async function fetch2026Live() {
            setTabActive('btn-live');
            display.innerHTML = '<div class="text-center py-20 animate-pulse font-bold uppercase tracking-widest text-slate-300">Conectando con Servidores FIFA...</div>';
            try {
                const response = await fetch('https://api.football-data.org/v4/competitions/WC/matches', {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                const data = await response.json();
                if (data.matches && data.matches.length > 0) {
                    renderMatches(data.matches);
                } else {
                    display.innerHTML = '<div class="bg-white p-20 border border-slate-200 text-center"><h3 class="text-2xl font-black italic">Mundial 2026</h3><p class="text-slate-500 mt-2">La API está conectada. Los partidos aparecerán tras el sorteo oficial.</p></div>';
                }
            } catch (error) {
                display.innerHTML = '<div class="bg-rose-50 p-10 text-rose-700 text-center font-bold">Error de conexión API. Comprueba tu llave.</div>';
            }
        }

        function showHistory(tab) {
            setTabActive('btn-' + tab);
            const data = historyDB[tab];
            const headers = Object.keys(data[0]);
            display.innerHTML = `<h2 class="text-2xl font-black uppercase italic mb-8">${tab}</h2>`;
            
            const tableWrap = document.createElement('div');
            tableWrap.className = "bg-white border border-slate-200 overflow-hidden";
            tableWrap.innerHTML = `
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>${headers.map(h => `<th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">${h}</th>`).join('')}</tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 italic font-medium">
                        ${data.map(row => `<tr>${headers.map(h => `<td class="p-4">${row[h]}</td>`).join('')}</tr>`).join('')}
                    </tbody>
                </table>`;
            display.appendChild(tableWrap);
        }

        function setTabActive(id) {
            document.querySelectorAll('button').forEach(el => el.classList.remove('sidebar-active'));
            if(document.getElementById(id)) document.getElementById(id).classList.add('sidebar-active');
        }

        window.onload = fetch2026Live;
    </script>
</body>
</html>
