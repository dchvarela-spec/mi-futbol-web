<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LineCall | Enciclopedia Total de los Mundiales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #0f172a; overflow: hidden; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
        .sidebar-l { background-color: #020617; width: 300px; shrink: 0; }
        .sidebar-r { background-color: white; border-left: 1px solid #e2e8f0; width: 380px; shrink: 0; }
        .nav-item { border-left: 4px solid transparent; transition: 0.2s; cursor: pointer; color: #94a3b8; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); border-left-color: #e11d48; color: white; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .entity-link { color: #2563eb; font-weight: 700; text-decoration: underline; cursor: pointer; }
        .entity-link:hover { color: #e11d48; background: #fff1f2; }
        th { background: #f8fafc; padding: 12px; font-size: 10px; text-transform: uppercase; color: #64748b; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .news-card { border-bottom: 1px solid #f1f5f9; padding: 15px; transition: 0.2s; }
        .news-card:hover { background: #f8fafc; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <!-- COLUMNA IZQUIERDA: MENÚS -->
    <aside class="sidebar-l flex flex-col overflow-y-auto hidden lg:flex">
        <div class="p-8 border-b border-white/5 bg-slate-950">
            <h1 class="text-xl font-black italic tracking-tighter text-white uppercase leading-none">LINE<span class="text-rose-600">CALL</span></h1>
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-2">Encyclopedia 1930-2026</p>
        </div>
        <nav class="flex-1 py-4">
            <div onclick="show2026()" id="btn-live" class="nav-item active px-8 py-3 text-sm font-bold flex items-center gap-2">
                <i class="fas fa-satellite-dish text-rose-600"></i> United 2026 Live
            </div>
            
            <div class="px-8 py-6 text-[10px] font-black text-slate-500 uppercase tracking-widest">Los 10 Récords de Oro</div>
            <div id="goldMenu" class="space-y-1"></div>

            <div class="px-8 py-6 text-[10px] font-black text-slate-500 uppercase tracking-widest">Explorador Histórico</div>
            <div onclick="showFullArchive('editions')" class="nav-item px-8 py-2 text-xs font-semibold italic">Todas las Ediciones</div>
            <div onclick="showFullArchive('players')" class="nav-item px-8 py-2 text-xs font-semibold italic">Goleadores de Leyenda</div>
        </nav>
    </aside>

    <!-- CENTRO: BUSCADOR Y RESULTADOS -->
    <main class="flex-1 flex flex-col overflow-hidden bg-slate-50/50 italic font-medium">
        <header class="h-24 bg-white border-b border-slate-200 flex items-center px-10 gap-4 shrink-0 shadow-sm">
            <div class="flex-1 bg-slate-100 rounded-xl flex items-center px-6 py-4 border border-transparent focus-within:border-rose-600 transition-all">
                <i class="fas fa-search text-slate-400 mr-4"></i>
                <input type="text" id="masterInput" placeholder="Busca jugador, país, árbitro o año (ej: 'Maradona', 'México', '2022')..." 
                       class="bg-transparent w-full outline-none text-sm font-bold" onkeypress="if(event.key==='Enter') executeSearch()">
            </div>
            <button onclick="executeSearch()" class="bg-slate-900 text-white px-10 py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-rose-600 transition-all shadow-xl">
                Consultar
            </button>
        </header>

        <section id="viewport" class="flex-1 overflow-y-auto p-10">
            <!-- Carga inicial 2026 -->
        </section>
    </main>

    <!-- DERECHA: NOTICIAS -->
    <aside class="sidebar-r flex flex-col overflow-hidden hidden xl:flex">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-white">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-900">Noticias de Fútbol</h3>
            <i class="fas fa-newspaper text-rose-600"></i>
        </div>
        <div id="newsFeed" class="flex-1 overflow-y-auto">
            <div class="p-10 text-center animate-pulse text-slate-300 font-bold uppercase text-[10px]">Actualizando Prensa...</div>
        </div>
    </aside>

    <script>

                { Año: "2014", Sede: "Brasil", Campeón: "Alemania", Final: "1-0 vs Argentina", Balón_Oro: "Lionel Messi", Goles_Totales: "171", Arbitro_Final: "Nicola Rizzoli" },

                { Año: "2006", Sede: "Alemania", Campeón: "Italia", Final: "1-1 (5-3 p.)", Balón_Oro: "Zinedine Zidane", Goles_Totales: "147", Arbitro_Final: "Horacio Elizondo" },
                { Año: "2002", Sede: "Corea-Japón", Campeón: "Brasil", Final: "2-0 vs Alemania", Balón_Oro: "Oliver Kahn", Goles_Totales: "161", Arbitro_Final: "Pierluigi Collina" },
                { Año: "1998", Sede: "Francia", Campeón: "Francia", Final: "3-0 vs Brasil", Balón_Oro: "Ronaldo", Goles_Totales: "171", Arbitro_Final: "Said Belqola" },
                { Año: "1994", Sede: "EEUU", Campeón: "Brasil", Final: "0-0 (3-2 p.)", Balón_Oro: "Romário", Goles_Totales: "141", Arbitro_Final: "Sandor Puhl" },
                { Año: "1990", Sede: "Italia", Campeón: "Alemania", Final: "1-0 vs Argentina", Balón_Oro: "Salvatore Schillaci", Goles_Totales: "115", Arbitro_Final: "Edgardo Codesal" },
                { Año: "1986", Sede: "México", Campeón: "Argentina", Final: "3-2 vs Alemania", Balón_Oro: "Diego Maradona", Goles_Totales: "132", Arbitro_Final: "Romualdo Arppi Filho" },
                { Año: "1982", Sede: "España", Campeón: "Italia", Final: "3-1 vs Alemania", Balón_Oro: "Paolo Rossi", Goles_Totales: "146", Arbitro_Final: "Arnaldo Coelho" },
                { Año: "1978", Sede: "Argentina", Campeón: "Argentina", Final: "3-1 vs Holanda", Balón_Oro: "Mario Kempes", Goles_Totales: "102", Arbitro_Final: "Sergio Gonella" },
                { Año: "1974", Sede: "Alemania", Campeón: "Alemania", Final: "2-1 vs Holanda", Balón_Oro: "Johan Cruyff", Goles_Totales: "97", Arbitro_Final: "Jack Taylor" },
                { Año: "1970", Sede: "México", Campeón: "Brasil", Final: "4-1 vs Italia", Balón_Oro: "Pelé", Goles_Totales: "95", Arbitro_Final: "Rudi Glöckner" },
                { Año: "1966", Sede: "Inglaterra", Campeón: "Inglaterra", Final: "4-2 vs Alemania", Balón_Oro: "Bobby Charlton", Goles_Totales: "89", Arbitro_Final: "Gottfried Dienst" },
                { Año: "1962", Sede: "Chile", Campeón: "Brasil", Final: "3-1 vs Checoslovaquia", Balón_Oro: "Garrincha", Goles_Totales: "89", Arbitro_Final: "Nikolay Latyshev" },
                { Año: "1958", Sede: "Suecia", Campeón: "Brasil", Final: "5-2 vs Suecia", Balón_Oro: "Didi", Goles_Totales: "126", Arbitro_Final: "Maurice Guigue" },
                { Año: "1954", Sede: "Suiza", Campeón: "Alemania", Final: "3-2 vs Hungría", Balón_Oro: "Puskás", Goles_Totales: "140", Arbitro_Final: "William Ling" },
                { Año: "1950", Sede: "Brasil", Campeón: "Uruguay", Final: "2-1 vs Brasil", Balón_Oro: "Zizinho", Goles_Totales: "88", Arbitro_Final: "George Reader" },
                { Año: "1938", Sede: "Francia", Campeón: "Italia", Final: "4-2 vs Hungría", Balón_Oro: "Leônidas", Goles_Totales: "84", Arbitro_Final: "Georges Capdeville" },
                { Año: "1934", Sede: "Italia", Campeón: "Italia", Final: "2-1 vs Checoslovaquia", Balón_Oro: "Meazza", Goles_Totales: "70", Arbitro_Final: "Ivan Eklind" },
                { Año: "1930", Sede: "Uruguay", Campeón: "Uruguay", Final: "4-2 vs Argentina", Balón_Oro: "Nasazzi", Goles_Totales: "70", Arbitro_Final: "Jean Langenus" }
            ],
            players: [
                { Nombre: "Miroslav Klose", País: "Alemania", Goles: "16", Mundiales: "2002, 2006, 2010, 2014", Récord: "Máximo goleador histórico" },
                { Nombre: "Lionel Messi", País: "Argentina", Goles: "13", Mundiales: "2006, 2010, 2014, 2018, 2022", Récord: "Más partidos (26)" },
                { Nombre: "Pelé", País: "Brasil", Goles: "12", Mundiales: "1958, 1962, 1966, 1970", Récord: "Único con 3 títulos" },
                { Nombre: "Diego Maradona", País: "Argentina", Goles: "8", Mundiales: "1982, 1986, 1990, 1994", Récord: "El Gol del Siglo" },
                { Nombre: "Just Fontaine", País: "Francia", Goles: "13", Mundiales: "1958", Récord: "Más goles en un solo mundial" },
                { Nombre: "Oleg Salenko", País: "Rusia", Goles: "6", Mundiales: "1994", Récord: "5 goles en un solo partido" }
            ],
            records: [
                { Título: "Gol más rápido", Sujeto: "Hakan Sukur", Marca: "11 segundos", Año: "2002" },
                { Título: "Mayor nº de goles por partido", Sujeto: "Austria vs Suiza", Marca: "12 Goles (7-5)", Año: "1954" },
                { Título: "Mayor goleador en un partido", Sujeto: "Oleg Salenko", Marca: "5 Goles", Año: "1994" },
                { Título: "Mayor nº de penaltis en un partido", Sujeto: "Argentina vs Francia", Marca: "3 Penaltis", Año: "2022" },
                { Título: "Expulsión más rápida", Sujeto: "Jose Batista", Marca: "56 segundos", Año: "1986" },
                { Título: "Cambio más rápido", Sujeto: "Alessandro Nesta", Marca: "4 minutos", Año: "1998" },
                { Título: "Partido más largo", Sujeto: "Argentina vs Francia", Marca: "145 min", Año: "2022" },
                { Título: "Jugador con más faltas cometidas", Sujeto: "Javier Mascherano", Marca: "31 Faltas", Año: "2014" },
                { Título: "Portero menos goleado", Sujeto: "Pascal Zuberbühler", Marca: "0 Goles recibidos", Año: "2006" },
                { Título: "Máximo goleador histórico", Sujeto: "Miroslav Klose", Marca: "16 Goles", Año: "2002-2014" }
            ]
        };

        const viewport = document.getElementById('viewport');

        // BUSCADOR UNIVERSAL REPETIBLE
        async function executeSearch(forcedQuery) {
            const query = (forcedQuery || document.getElementById('masterInput').value).trim();
            if (!query) return;

            viewport.innerHTML = `<div class="p-10 text-center animate-pulse text-slate-400 font-bold uppercase italic">Consultando Enciclopedia Global...</div>`;
            let resultsHTML = "";
            let found = false;

            // 1. API DE PAÍSES (REST COUNTRIES)
            try {
                const res = await fetch(`https://restcountries.com/v3.1/name/${query}`);
                const data = await res.json();
                if (data && data[0]) {
                    const c = data[0];
                    resultsHTML += `
                        <div class="card p-8 mb-10 bg-slate-900 text-white flex items-center gap-8 border-b-8 border-rose-600">
                            <img src="${c.flags.svg}" class="w-32 rounded shadow-2xl">
                            <div><h3 class="text-4xl font-black uppercase tracking-tighter">${c.name.common}</h3><p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-2">${c.region} | Capital: ${c.capital}</p></div>
                        </div>`;
                    found = true;
                }
            } catch (e) {}

            // 2. BUSCAR EN DB INTERNA
            const q = query.toLowerCase();
            const filteredEditions = db.editions.filter(e => JSON.stringify(e).toLowerCase().includes(q));
            if (filteredEditions.length > 0) { 
                found = true; 
                resultsHTML += `<h4 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Encuentros Históricos</h4>` + renderTable(filteredEditions); 
            }

            const filteredPlayers = db.players.filter(p => JSON.stringify(p).toLowerCase().includes(q));
            if (filteredPlayers.length > 0) { 
                found = true; 
                resultsHTML += `<h4 class="text-[10px] font-black uppercase text-slate-400 mb-4 mt-10 tracking-widest">Fichas de Jugadores</h4>` + renderTable(filteredPlayers); 
            }

            const filteredRecords = db.records.filter(r => JSON.stringify(r).toLowerCase().includes(q));
            if (filteredRecords.length > 0) {
                found = true;
                resultsHTML += `<h4 class="text-[10px] font-black uppercase text-slate-400 mb-4 mt-10 tracking-widest">Récords Encontrados</h4>` + renderTable(filteredRecords);
            }

            viewport.innerHTML = found ? resultsHTML : `<div class="card p-20 text-center italic font-bold text-slate-300">Sin resultados para "${query}"</div>`;
        }

        // NOTICIAS (PROXY CORREGIDO)
        async function fetchNews() {
            const feed = document.getElementById('newsFeed');
            const apiUrl = `https://newsapi.org/v2/everything?q=fútbol+worldcup&language=es&sortBy=publishedAt&pageSize=10&apiKey=${NEWS_API_KEY}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const json = await response.json();
                const data = JSON.parse(json.contents);
                
                if (data.articles) {
                    feed.innerHTML = data.articles.map(a => `
                        <div class="news-card">
                            <span class="text-[8px] font-black text-rose-600 uppercase tracking-widest">${a.source.name}</span>
                            <a href="${a.url}" target="_blank" class="text-[13px] font-bold leading-tight hover:text-rose-700 block mt-1">${a.title}</a>
                        </div>
                    `).join('');
                }
            } catch (e) {
                feed.innerHTML = `<div class="p-10 text-center text-slate-300 uppercase text-[9px]">Servicio de prensa saturado.</div>`;
            }
        }

        function linkify(text) {
            if (!text || typeof text !== 'string' || !isNaN(text) || text.length < 3) return text;
            return `<span class="entity-link" onclick="executeSearch('${text}')">${text}</span>`;
        }

        function renderTable(data) {
            const headers = Object.keys(data[0]);
            let html = `<div class="card overflow-hidden mb-10"><table><thead><tr>`;
            headers.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            data.forEach(row => {
                html += `<tr>`;
                headers.forEach(h => html += `<td>${linkify(row[h])}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table></div>`;
            return html;
        }

        function showFullArchive(key) {
            viewport.innerHTML = `<h2 class="text-2xl font-black italic uppercase mb-8">${key === 'editions' ? 'Todos los Mundiales (1930-2022)' : 'Goleadores Históricos'}</h2>` + renderTable(db[key]);
        }

        function show2026() {
            viewport.innerHTML = `<div class="max-w-4xl mx-auto py-12 text-center">
                <div class="card p-16 border-t-8 border-rose-600">
                    <h2 class="text-6xl font-black italic uppercase mb-4 tracking-tighter italic">United 2026</h2>
                    <p class="text-rose-600 font-bold uppercase tracking-widest italic mb-10 underline">Live Data Stream Active</p>
                    <div class="grid grid-cols-3 gap-4 mb-10 font-black text-4xl italic text-slate-900">
                        <div class="p-6 bg-slate-50 rounded">48<p class="text-[10px] uppercase text-slate-400 font-bold">Equipos</p></div>
                        <div class="p-6 bg-slate-50 rounded">104<p class="text-[10px] uppercase text-slate-400 font-bold">Partidos</p></div>
                        <div class="p-6 bg-slate-50 rounded">16<p class="text-[10px] uppercase text-slate-400 font-bold">Sedes</p></div>
                    </div>
                    <p class="text-xs text-slate-400 font-medium">Resultados en vivo disponibles a partir del 11 de Junio 2026.</p>
                </div></div>`;
        }

        function init() {
            const menu = document.getElementById('goldMenu');
            db.records.forEach((r, i) => {
                menu.innerHTML += `<div onclick="executeSearch('${r.Sujeto}')" class="nav-item px-8 py-2 text-[11px] font-bold italic transition-all uppercase tracking-tighter">#${i+1} ${r.Título}</div>`;
            });
            show2026();
            fetchNews();
        }

        init();
    </script>
</body>
</html>
