<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC INTEL PRO | 2026 LIVE & HISTORY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #05070a; color: #e2e8f0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .sidebar-item:hover, .sidebar-item.active { background: #1e293b; border-left: 4px solid #f59e0b; color: #fff; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .live-pulse { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 12px #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-80 bg-slate-950 border-r border-slate-900 flex flex-col">
        <div class="p-8">
            <h1 class="text-2xl font-black tracking-tighter text-white">WC<span class="text-amber-500">INTEL</span></h1>
            <div class="flex items-center gap-2 mt-2">
                <div class="live-pulse"></div>
                <p class="text-[10px] text-emerald-500 font-bold uppercase tracking-[0.2em]">API Connection: Active</p>
            </div>
        </div>
        
        <nav class="flex-1 px-4 space-y-1">
            <p class="px-4 text-[10px] font-bold text-slate-600 uppercase mb-4 tracking-widest">Live Coverage</p>
            <button onclick="fetch2026Live()" id="btn-live" class="sidebar-item active w-full flex items-center justify-between px-4 py-4 rounded-xl text-sm font-bold transition-all">
                <span class="flex items-center gap-3"><i class="fas fa-satellite-dish text-amber-500"></i> WORLD CUP 2026</span>
                <i class="fas fa-chevron-right text-[10px] opacity-30"></i>
            </button>

            <p class="px-4 text-[10px] font-bold text-slate-600 uppercase mt-8 mb-4 tracking-widest">Archives</p>
            <button onclick="showHistory('editions')" id="btn-editions" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold">
                <i class="fas fa-history text-slate-500"></i> Palmarés Histórico
            </button>
            <button onclick="showHistory('players')" id="btn-players" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold">
                <i class="fas fa-trophy text-slate-500"></i> Máximos Goleadores
            </button>
            <button onclick="showHistory('referees')" id="btn-referees" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold">
                <i class="fas fa-stopwatch text-slate-500"></i> Árbitros de Finales
            </button>
        </nav>

        <div class="p-6 bg-slate-950 border-t border-slate-900">
            <div class="text-[9px] font-mono text-slate-600">
                SYSTEM_LOG: <span class="text-emerald-800">10e51e... READY</span><br>
                DATE: 18_MAR_2026
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-24 border-b border-slate-900 flex items-center justify-between px-10 bg-slate-950/40">
            <div>
                <h2 id="mainTitle" class="text-2xl font-bold text-white">World Cup 2026 Center</h2>
                <p id="mainSubtitle" class="text-xs text-slate-500 uppercase tracking-widest font-semibold mt-1">United 2026: Official FIFA Data Stream</p>
            </div>
            <div class="flex gap-4">
                <div class="bg-slate-900 px-5 py-3 rounded-2xl border border-slate-800">
                    <p class="text-[9px] font-bold text-slate-500 uppercase">Días para el Mundial</p>
                    <p class="text-xl font-black text-amber-500 mono tracking-tighter">~ 85 DÍAS</p>
                </div>
            </div>
        </header>

        <section id="contentArea" class="flex-1 overflow-y-auto p-10 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
            <!-- Content Injected Here -->
             <div id="loader" class="hidden flex flex-col items-center justify-center h-full">
                <div class="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-xs font-mono text-amber-500 uppercase tracking-widest">Sincronizando con Servidores FIFA...</p>
             </div>
             <div id="display" class="grid grid-cols-1 gap-6"></div>
        </section>
    </main>

    <script>
        const API_KEY = '10e51efe3147485c9a4dcfe12ebfd655';
        const display = document.getElementById('display');
        const loader = document.getElementById('loader');

        const historyDB = {
            editions: [
                { Año: 2022, Sede: "Qatar", Campeón: "Argentina", Final: "3-3 (4-2 p.)", PJ: 64, Goles: 172 },
                { Año: 2018, Sede: "Rusia", Campeón: "Francia", Final: "4-2", PJ: 64, Goles: 169 },
                { Año: 2014, Sede: "Brasil", Campeón: "Alemania", Final: "1-0", PJ: 64, Goles: 171 },
                { Año: 2010, Sede: "Sudáfrica", Campeón: "España", Final: "1-0", PJ: 64, Goles: 145 },
                { Año: 2006, Sede: "Alemania", Campeón: "Italia", Final: "1-1 (5-3 p.)", PJ: 64, Goles: 147 }
            ],
            players: [
                { Nombre: "Miroslav Klose", Goles: 16, Selección: "Alemania", Apps: 24 },
                { Nombre: "Ronaldo Nazário", Goles: 15, Selección: "Brasil", Apps: 19 },
                { Nombre: "Lionel Messi", Goles: 13, Selección: "Argentina", Apps: 26 },
                { Nombre: "Just Fontaine", Goles: 13, Selección: "Francia", Apps: 6 },
                { Nombre: "Pelé", Goles: 12, Selección: "Brasil", Apps: 14 }
            ],
            referees: [
                { Arbitro: "Szymon Marciniak", Final: "2022", Pais: "Polonia" },
                { Arbitro: "Nestor Pitana", Final: "2018", Pais: "Argentina" },
                { Arbitro: "Nicola Rizzoli", Final: "2014", Pais: "Italia" },
                { Arbitro: "Howard Webb", Final: "2010", Pais: "Inglaterra" },
                { Arbitro: "Pierluigi Collina", Final: "2002", Pais: "Italia" }
            ]
        };

        async function fetch2026Live() {
            setTabActive('btn-live');
            display.innerHTML = '';
            loader.classList.remove('hidden');
            
            try {
                // Consultamos partidos del Mundial (Código 'WC')
                const response = await fetch('https://api.football-data.org/v4/competitions/WC/matches', {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                const data = await response.json();
                loader.classList.add('hidden');

                if (data.matches && data.matches.length > 0) {
                    renderMatches(data.matches);
                } else {
                    render2026Placeholder();
                }
            } catch (error) {
                loader.classList.add('hidden');
                render2026Placeholder(); // Fallback por si la API aún no tiene partidos cargados
            }
        }

        function renderMatches(matches) {
            document.getElementById('mainTitle').innerText = "Match Center 2026";
            display.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6";
            
            display.innerHTML = matches.map(m => `
                <div class="glass-panel p-6 rounded-3xl hover:border-amber-500/30 transition-all cursor-pointer">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[9px] font-bold bg-slate-800 px-3 py-1 rounded-full uppercase text-slate-400">${m.group || 'Fase Final'}</span>
                        <span class="text-[9px] font-black text-amber-500 uppercase tracking-widest">${m.status}</span>
                    </div>
                    <div class="flex items-center justify-between gap-4">
                        <div class="text-center flex-1">
                            <img src="${m.homeTeam.crest}" class="w-12 h-12 mx-auto mb-2 object-contain">
                            <p class="text-xs font-bold uppercase tracking-tighter">${m.homeTeam.shortName || m.homeTeam.name}</p>
                        </div>
                        <div class="text-2xl font-black mono text-white">
                            ${m.score.fullTime.home !== null ? m.score.fullTime.home : '-'} : ${m.score.fullTime.away !== null ? m.score.fullTime.away : '-'}
                        </div>
                        <div class="text-center flex-1">
                            <img src="${m.awayTeam.crest}" class="w-12 h-12 mx-auto mb-2 object-contain">
                            <p class="text-xs font-bold uppercase tracking-tighter">${m.awayTeam.shortName || m.awayTeam.name}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function render2026Placeholder() {
            document.getElementById('mainTitle').innerText = "Próximamente: United 2026";
            display.className = "block";
            display.innerHTML = `
                <div class="glass-panel p-16 rounded-[3rem] text-center border-amber-500/20 max-w-4xl mx-auto mt-10">
                    <div class="w-20 h-20 bg-amber-500 rounded-full flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-amber-500/20">
                        <i class="fas fa-trophy text-slate-950 text-3xl"></i>
                    </div>
                    <h3 class="text-4xl font-black mb-4">CONEXIÓN ESTABLECIDA</h3>
                    <p class="text-slate-400 text-lg mb-10 font-light">Estamos conectados a la API de Football-Data. Los datos de partidos aparecerán automáticamente en cuanto la FIFA publique el calendario oficial de grupos.</p>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                        <div class="bg-slate-900/50 p-6 rounded-3xl border border-slate-800/50">
                            <p class="text-amber-500 font-bold text-xs uppercase mb-1">Equipos</p>
                            <p class="text-2xl font-black">48</p>
                        </div>
                        <div class="bg-slate-900/50 p-6 rounded-3xl border border-slate-800/50">
                            <p class="text-amber-500 font-bold text-xs uppercase mb-1">Partidos</p>
                            <p class="text-2xl font-black">104</p>
                        </div>
                        <div class="bg-slate-900/50 p-6 rounded-3xl border border-slate-800/50">
                            <p class="text-amber-500 font-bold text-xs uppercase mb-1">Sedes</p>
                            <p class="text-2xl font-black">16</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function showHistory(tab) {
            setTabActive('btn-' + tab);
            const data = historyDB[tab];
            const headers = Object.keys(data[0]);
            document.getElementById('mainTitle').innerText = "Archivo Histórico: " + tab.toUpperCase();
            display.className = "block";

            display.innerHTML = `
                <div class="glass-panel rounded-3xl overflow-hidden shadow-2xl border border-slate-800/50">
                    <table class="w-full text-left">
                        <thead class="bg-slate-900/80 text-[10px] font-bold text-slate-500 uppercase tracking-widest border-b border-slate-800">
                            <tr>${headers.map(h => `<th class="p-6">${h}</th>`).join('')}</tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800/30 text-sm">
                            ${data.map(row => `
                                <tr class="hover:bg-amber-500/[0.03] transition-colors">
                                    ${headers.map(h => `<td class="p-6 font-medium ${h==='Campeón'||h==='Nombre'?'text-amber-500 font-bold':''}">${row[h]}</td>`).join('')}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function setTabActive(id) {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Auto-load Live 2026
        window.onload = fetch2026Live;
    </script>
</body>
</html>
